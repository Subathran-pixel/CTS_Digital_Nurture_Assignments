<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Local Community Event Portal</title>

    <style>
        #welcomeBanner {
            background-color: blue;
        }

        .highlight {
            background-color: yellow;
        }

        .eventImage {
            border: 2px solid black;
        }

        form {
            border: 1px solid black;
            padding: 10px;
            width: 300px;
        }
    </style>

</head>

<body>

    <!-- Navigation -->
    <nav>
        <a href="#home">Home</a> |
        <a href="#events">Events</a> |
        <a href="#contact">Contact</a> |
        <a href="help.html" target="_blank">Help</a>
    </nav>

    <!-- Home Section -->
    <section id="home">

        <div id="welcomeBanner">
            Welcome User
        </div>

        <p>
            <span style="color:red; font-weight:bold;">
                Special Offer
            </span>
        </p>

        <p class="highlight">
            Registration Open
        </p>

    </section>

    <!-- Events Section -->
    <section id="events">

        <h1>Events</h1>

        <table>

            <tr>
                <td>
                    <img src="images/event1.jpg" alt="Event 1"
                        title="Music Festival" class="eventImage"
                        width="200">
                    <p>Music Festival</p>
                </td>

                <td>
                    <img src="images/event2.jpg" alt="Event 2"
                        title="Sports Meet" class="eventImage"
                        width="200">
                    <p>Sports Meet</p>
                </td>

                <td>
                    <img src="images/event3.jpg" alt="Event 3"
                        title="Food Carnival" class="eventImage"
                        width="200">
                    <p>Food Carnival</p>
                </td>
            </tr>

            <tr>
                <td>
                    <img src="images/event4.jpg" alt="Event 4"
                        title="Art Exhibition" class="eventImage"
                        width="200">
                    <p>Art Exhibition</p>
                </td>

                <td>
                    <img src="images/event5.jpg" alt="Event 5"
                        title="Book Fair" class="eventImage"
                        width="200">
                    <p>Book Fair</p>
                </td>

                <td>
                    <img src="images/event6.jpg" alt="Event 6"
                        title="Community Gathering" class="eventImage"
                        width="200">
                    <p>Community Gathering</p>
                </td>
            </tr>

        </table>

    </section>

    <!-- Registration Form -->

    <h2>Event Registration Form</h2>

    <form onsubmit="msg.value='Registration Successful'; return false;">
     
        <label>Name : </label>
        <input type="text"
               placeholder="Enter Name"
               required
               autofocus>

        <br><br>

        <label> Email : </label>
        <input type="email"
               placeholder="Enter Email"
               required>

        <br><br>
        
        <label>Date Of Birth : </label>
        <input type="date"
               required>

        <br><br>

        <select required>
            <option value="">Select Event</option>
            <option>Music Festival</option>
            <option>Sports Meet</option>
            <option>Food Carnival</option>
            <option>Art Exhibition</option>
            <option>Book Fair</option>
            <option>Community Gathering</option>

        
        </select>

        <br><br>

        <textarea placeholder="Enter Message"
                  required></textarea>

        <br><br>

        <button type="submit">
            Register
        </button>

        <br><br>

        <output name="msg"></output>

    </form>

    <!-- Contact Section -->
    <section id="contact">
        <h1>Contact</h1>
        <p>Email : community@gmail.com</p>
        <p>Phone : +91 9876543210</p>
    </section>

</body>

</html>
